# nginx 配置 — 端口 8991
# 前端静态文件 + 代理到内部 FastAPI:8992
#
# 使用方法：
#   将本文件内容复制到 nginx 配置目录下（如 /etc/nginx/conf.d/analytics.conf）
#   或在 nginx.conf 的 http 块中 include 本文件
#   修改 root 路径为实际的 analytics-frontend 目录绝对路径
#   然后执行：nginx -t && nginx -s reload

server {
    listen 8991;
    server_name _;

    # 字符集
    charset utf-8;

    # 访问日志（可选）
    # access_log /var/log/nginx/analytics_access.log;
    # error_log  /var/log/nginx/analytics_error.log;

    # ── 前端静态文件 ────────────────────────────────────────────────────────
    location / {
        # ⚠️ 修改为服务器上 analytics-frontend 的绝对路径
        # 示例：root /home/user/morning_report/analytics-frontend;
        root /path/to/morning_report/analytics-frontend;

        # SPA 路由：找不到文件时回退到 index.html
        try_files $uri $uri/ /index.html;

        # 禁止强缓存（开发期间），正式上线可去掉
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 静态资源（CSS/JS）允许缓存 1 小时
    location ~* \.(js|css|png|ico|woff2?)$ {
        root /path/to/morning_report/analytics-frontend;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── API 代理到内部 FastAPI (127.0.0.1:8992) ─────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8992/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;

        # 上传文件大小限制（Excel 一般不超过 50MB）
        client_max_body_size 50m;
    }

    location /health {
        proxy_pass http://127.0.0.1:8992/health;
    }

    # ── 防止直接访问敏感路径 ─────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
