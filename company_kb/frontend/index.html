<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企业知识库助手</title>
<style>
:root{
  --bg:#0f1420; --panel:#161c2c; --panel-2:#1c2438; --line:#273049;
  --text:#e8edf7; --muted:#8a95ad; --brand:#5b8cff; --brand-2:#7aa2ff;
  --user:#2a3552; --ai:#171e30; --ok:#3ddc97; --warn:#ffb44c; --err:#ff6b6b;
  --shadow:0 8px 40px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;
  background:radial-gradient(1200px 800px at 20% -10%,#1a2540 0%,var(--bg) 55%);
  color:var(--text); height:100vh; overflow:hidden;
}
.app{display:flex;height:100vh}
/* 侧边栏 */
.side{
  width:260px;flex-shrink:0;background:rgba(22,28,44,.7);
  backdrop-filter:blur(12px);border-right:1px solid var(--line);
  display:flex;flex-direction:column;padding:20px 16px;
}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.logo{
  width:40px;height:40px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(135deg,var(--brand),#9d7bff);
  display:grid;place-items:center;font-size:20px;
  box-shadow:0 4px 16px rgba(91,140,255,.4);
}
.brand h1{font-size:16px;font-weight:600}
.brand p{font-size:12px;color:var(--muted);margin-top:2px}
.side-label{font-size:11px;color:var(--muted);text-transform:uppercase;
  letter-spacing:.08em;margin:8px 4px}
.model-sel{
  width:100%;background:var(--panel-2);color:var(--text);
  border:1px solid var(--line);border-radius:10px;padding:10px 12px;
  font-size:13px;cursor:pointer;outline:none;transition:border .2s;
}
.model-sel:focus{border-color:var(--brand)}
.tips{margin-top:auto;font-size:12px;color:var(--muted);line-height:1.7}
.tips b{color:var(--text);font-weight:500}
.status{display:flex;align-items:center;gap:7px;font-size:12px;
  color:var(--muted);margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
.dot.on{background:var(--ok);box-shadow:0 0 8px var(--ok)}
.dot.off{background:var(--err)}
/* 主区 */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.chat{flex:1;overflow-y:auto;padding:32px 0}
.chat::-webkit-scrollbar{width:8px}
.chat::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
.wrap{max-width:820px;margin:0 auto;padding:0 24px}
/* 欢迎屏 */
.welcome{text-align:center;padding:60px 20px;animation:fade .5s}
.welcome .big{font-size:44px;margin-bottom:16px}
.welcome h2{font-size:24px;margin-bottom:10px}
.welcome p{color:var(--muted);margin-bottom:32px}
.samples{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:560px;margin:0 auto}
.sample{
  background:var(--panel);border:1px solid var(--line);border-radius:14px;
  padding:16px;text-align:left;cursor:pointer;transition:all .2s;font-size:14px;
}
.sample:hover{border-color:var(--brand);transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(91,140,255,.15)}
.sample .s-t{font-weight:600;margin-bottom:4px}
.sample .s-d{font-size:12px;color:var(--muted)}
/* 消息 */
.msg{display:flex;gap:14px;margin-bottom:26px;animation:fade .4s}
.avatar{width:36px;height:36px;border-radius:10px;flex-shrink:0;
  display:grid;place-items:center;font-size:16px}
.msg.user .avatar{background:var(--user)}
.msg.ai .avatar{background:linear-gradient(135deg,var(--brand),#9d7bff)}
.bubble{flex:1;min-width:0}
.role{font-size:12px;color:var(--muted);margin-bottom:6px}
.content{
  background:var(--ai);border:1px solid var(--line);border-radius:14px;
  padding:14px 18px;line-height:1.75;font-size:15px;white-space:pre-wrap;
  word-break:break-word;
}
.msg.user .content{background:var(--user);border-color:#33406a}
.content.streaming::after{content:"▋";color:var(--brand);animation:blink 1s infinite}
@keyframes blink{50%{opacity:0}}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.sources{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px}
.src{font-size:12px;background:var(--panel-2);border:1px solid var(--line);
  color:var(--brand-2);padding:4px 10px;border-radius:20px}
.meta{font-size:11px;color:var(--muted);margin-top:8px}
/* 输入栏 */
.composer{padding:16px 0 24px;border-top:1px solid var(--line);
  background:linear-gradient(to top,var(--bg),transparent 90%)}
.composer .wrap{display:flex;gap:12px;align-items:flex-end}
.input-box{flex:1;position:relative;background:var(--panel);
  border:1px solid var(--line);border-radius:16px;transition:border .2s}
.input-box:focus-within{border-color:var(--brand);
  box-shadow:0 0 0 3px rgba(91,140,255,.12)}
textarea{width:100%;background:transparent;border:none;outline:none;resize:none;
  color:var(--text);font-size:15px;padding:14px 16px;font-family:inherit;
  line-height:1.5;max-height:160px}
.send{width:46px;height:46px;flex-shrink:0;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--brand),#7b6bff);color:#fff;font-size:18px;
  cursor:pointer;transition:all .2s;display:grid;place-items:center}
.send:hover:not(:disabled){transform:scale(1.06);box-shadow:0 4px 16px rgba(91,140,255,.5)}
.send:disabled{opacity:.4;cursor:not-allowed}
.hint{text-align:center;font-size:11px;color:var(--muted);margin-top:8px}
/* 上传按钮 */
.upload-btn{
  width:100%;margin-top:14px;background:var(--panel-2);color:var(--text);
  border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s;
}
.upload-btn:hover{border-color:var(--brand);color:var(--brand-2)}
/* 弹层 */
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
  display:none;place-items:center;z-index:50}
.modal-mask.show{display:grid}
.modal{width:min(560px,92vw);max-height:86vh;overflow:auto;background:var(--panel);
  border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:22px}
.modal h3{font-size:17px;margin-bottom:4px}
.modal .sub{font-size:12px;color:var(--muted);margin-bottom:16px}
.modal .x{float:right;cursor:pointer;color:var(--muted);font-size:20px;line-height:1}
.modal .x:hover{color:var(--text)}
.dropzone{border:2px dashed var(--line);border-radius:14px;padding:28px 16px;
  text-align:center;cursor:pointer;transition:all .2s;color:var(--muted)}
.dropzone:hover,.dropzone.over{border-color:var(--brand);background:rgba(91,140,255,.08);color:var(--text)}
.dropzone .dz-ic{font-size:32px;margin-bottom:8px}
.dropzone b{color:var(--brand-2)}
.dz-exts{font-size:11px;margin-top:8px}
.results{margin-top:14px;display:flex;flex-direction:column;gap:6px}
.res-row{font-size:13px;padding:8px 12px;border-radius:10px;border:1px solid var(--line);
  background:var(--panel-2);display:flex;gap:8px;align-items:center}
.res-row.ok{border-color:rgba(61,220,151,.4)}
.res-row.warn{border-color:rgba(255,180,76,.4)}
.res-row.error{border-color:rgba(255,107,107,.4)}
.res-row .rn{font-weight:500;flex-shrink:0}
.res-row .rm{color:var(--muted);font-size:12px;margin-left:auto}
.doc-list{margin-top:18px;border-top:1px solid var(--line);padding-top:14px}
.doc-list .dl-t{font-size:12px;color:var(--muted);margin-bottom:10px}
.doc-row{display:flex;align-items:center;gap:8px;font-size:13px;padding:7px 10px;
  border-radius:9px;transition:background .2s}
.doc-row:hover{background:var(--panel-2)}
.doc-row .dn{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-row .dc{font-size:11px;color:var(--muted);flex-shrink:0}
.doc-row .del{cursor:pointer;color:var(--muted);flex-shrink:0;padding:2px 6px;border-radius:6px}
.doc-row .del:hover{color:var(--err);background:rgba(255,107,107,.12)}
.busy-note{font-size:12px;color:var(--brand-2);margin-top:12px;display:none}
.busy-note.show{display:block}
/* 响应式 */
@media(max-width:720px){
  .side{display:none}
  .samples{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">
      <div class="logo">📚</div>
      <div><h1>知识库助手</h1><p>企业内部智能问答</p></div>
    </div>
    <div class="side-label">回答模型</div>
    <select class="model-sel" id="model"></select>
    <button class="upload-btn" id="upload-open">📤 上传文档到知识库</button>
    <div class="tips">
      <div class="side-label" style="margin-top:20px">使用提示</div>
      直接输入问题即可。回答<b>只基于</b>已入库的公司文档，并标注<b>来源</b>。
      资料中没有的内容会如实说明，不会编造。
    </div>
    <div class="status">
      <span class="dot" id="dot"></span>
      <span id="stat">连接中…</span>
    </div>
  </aside>

  <main class="main">
    <div class="chat" id="chat">
      <div class="wrap">
        <div class="welcome" id="welcome">
          <div class="big">👋</div>
          <h2>你好，我是知识库助手</h2>
          <p>问我关于公司制度、流程、手册的任何问题</p>
          <div class="samples" id="samples"></div>
        </div>
      </div>
    </div>

    <div class="composer">
      <div class="wrap">
        <div class="input-box">
          <textarea id="q" rows="1" placeholder="输入你的问题，回车发送…"></textarea>
        </div>
        <button class="send" id="send" title="发送">➤</button>
      </div>
      <div class="hint">回车发送 · Shift+回车换行 · 回答由 AI 生成，请以官方文件为准</div>
    </div>
  </main>
</div>

<!-- 上传弹层 -->
<div class="modal-mask" id="modal-mask">
  <div class="modal">
    <span class="x" id="modal-close">✕</span>
    <h3>📤 上传文档到知识库</h3>
    <div class="sub">支持 .txt .md .docx .pdf .xlsx · 重复上传同名文件将覆盖旧版本</div>

    <div class="dropzone" id="dz">
      <input type="file" id="file-input" multiple
        accept=".txt,.md,.docx,.pdf,.xlsx" style="display:none">
      <div class="dz-ic">📂</div>
      <div>拖拽文件到此处，或 <b>点击选择文件</b></div>
      <div class="dz-exts">支持：txt · md · docx · pdf · xlsx</div>
    </div>

    <div class="busy-note" id="busy-note">⏳ 正在向量化入库，请稍候…</div>
    <div class="results" id="results"></div>

    <div class="doc-list" id="doc-list">
      <div class="dl-t">📚 已入库文档</div>
      <div id="doc-rows">加载中…</div>
    </div>
  </div>
</div>
<script>
// 后端地址：
//  - 生产：Nginx 托管前端于 3030 并反代 /api → 用同源相对路径（""）
//  - 本地开发：直接双击打开 index.html（file://）→ 直连后端 8994
const API = location.protocol === "file:" ? "http://127.0.0.1:8994" : "";

const $ = s => document.querySelector(s);
const chat = $("#chat"), welcome = $("#welcome"), qEl = $("#q"), sendBtn = $("#send");
let busy = false;

const SAMPLES = [
  {t:"考勤规定", d:"迟到、弹性打卡怎么算？"},
  {t:"请假制度", d:"年假、病假、事假有什么规定？"},
  {t:"报销流程", d:"差旅费怎么报？多久到账？"},
  {t:"设备管理", d:"电脑坏了找谁修？"},
];

function initSamples(){
  const box = $("#samples");
  box.innerHTML = SAMPLES.map(s =>
    `<div class="sample" data-q="${s.d}">
       <div class="s-t">${s.t}</div><div class="s-d">${s.d}</div></div>`
  ).join("");
  box.querySelectorAll(".sample").forEach(el =>
    el.onclick = () => { qEl.value = el.dataset.q; ask(); });
}

async function loadHealth(){
  try{
    const r = await fetch(API + "/api/health");
    const d = await r.json();
    if(d.indexed && d.chunks > 0){
      $("#dot").className = "dot on";
      $("#stat").textContent = `已就绪 · ${d.chunks} 个知识块`;
    }else{
      $("#dot").className = "dot off";
      $("#stat").textContent = "知识库为空";
    }
  }catch(e){
    $("#dot").className = "dot off";
    $("#stat").textContent = "后端未连接";
  }
}

async function loadModels(){
  try{
    const r = await fetch(API + "/api/models");
    const d = await r.json();
    $("#model").innerHTML = d.options.map(m =>
      `<option value="${m}" ${m===d.default?"selected":""}>${m}</option>`).join("");
  }catch(e){ $("#model").innerHTML = "<option>gpt-5.5</option>"; }
}
function esc(t){const d=document.createElement("div");d.textContent=t;return d.innerHTML;}

function addMsg(role, text){
  welcome && welcome.remove();
  const wrap = document.createElement("div");
  wrap.className = "wrap";
  const isUser = role === "user";
  wrap.innerHTML =
    `<div class="msg ${role}">
       <div class="avatar">${isUser?"🙋":"🤖"}</div>
       <div class="bubble">
         <div class="role">${isUser?"你":"知识库助手"}</div>
         <div class="content ${isUser?"":"streaming"}">${esc(text)}</div>
       </div>
     </div>`;
  chat.appendChild(wrap);
  scrollDown();
  return wrap.querySelector(".content");
}

function scrollDown(){ chat.scrollTop = chat.scrollHeight; }

async function ask(){
  const q = qEl.value.trim();
  if(!q || busy) return;
  busy = true; sendBtn.disabled = true;
  qEl.value = ""; qEl.style.height = "auto";
  addMsg("user", q);
  const contentEl = addMsg("ai", "");
  let answer = "", sources = [], usedModel = "";

  try{
    const resp = await fetch(API + "/api/ask", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({question:q, model:$("#model").value})
    });
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = "";
    while(true){
      const {value, done} = await reader.read();
      if(done) break;
      buf += dec.decode(value, {stream:true});
      const parts = buf.split("\n\n");
      buf = parts.pop();
      for(const p of parts){
        const ev = (p.match(/event: (.*)/)||[])[1];
        const dm = p.match(/data: (.*)/s);
        if(!dm) continue;
        const data = JSON.parse(dm[1]);
        if(ev==="sources"){ sources = data.sources; }
        else if(ev==="model"){ usedModel = data.model; }
        else if(ev==="token"){ answer += data.text; contentEl.textContent = answer; scrollDown(); }
        else if(ev==="warn"){ contentEl.textContent = answer + "\n["+data.message+"]"; }
        else if(ev==="error"){ answer = "⚠️ "+data.message; contentEl.textContent = answer; }
        else if(ev==="done"){ usedModel = data.model; }
      }
    }
  }catch(e){
    contentEl.textContent = "⚠️ 请求失败：" + e.message;
  }
  contentEl.classList.remove("streaming");
  if(sources.length){
    const meta = document.createElement("div");
    meta.innerHTML = `<div class="sources">${
      sources.map(s=>`<span class="src">📄 ${esc(s)}</span>`).join("")}</div>`
      + (usedModel?`<div class="meta">模型: ${esc(usedModel)}</div>`:"");
    contentEl.parentElement.appendChild(meta);
  }
  busy = false; sendBtn.disabled = false; qEl.focus();
}

// 事件绑定
sendBtn.onclick = ask;
qEl.addEventListener("keydown", e => {
  if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); ask(); }
});
qEl.addEventListener("input", () => {
  qEl.style.height = "auto";
  qEl.style.height = Math.min(qEl.scrollHeight,160) + "px";
});

// ---------- 上传功能 ----------
const mask      = $("#modal-mask");
const dz        = $("#dz");
const fileInput = $("#file-input");
const busyNote  = $("#busy-note");
const resultsEl = $("#results");
const docRowsEl = $("#doc-rows");

function openModal(){
  mask.classList.add("show");
  loadDocList();
}
function closeModal(){ mask.classList.remove("show"); }

$("#upload-open").onclick = openModal;
$("#modal-close").onclick = closeModal;
mask.onclick = e => { if(e.target === mask) closeModal(); };

// 点击 dropzone 触发文件选择
dz.onclick = e => { if(e.target !== fileInput) fileInput.click(); };
fileInput.onchange = () => {
  if(fileInput.files.length) doUpload(Array.from(fileInput.files));
};

// 拖拽
dz.addEventListener("dragover", e => { e.preventDefault(); dz.classList.add("over"); });
dz.addEventListener("dragleave", () => dz.classList.remove("over"));
dz.addEventListener("drop", e => {
  e.preventDefault(); dz.classList.remove("over");
  if(e.dataTransfer.files.length) doUpload(Array.from(e.dataTransfer.files));
});

async function doUpload(files){
  resultsEl.innerHTML = "";
  busyNote.classList.add("show");
  const fd = new FormData();
  files.forEach(f => fd.append("files", f));
  try{
    const r = await fetch(API + "/api/upload", {method:"POST", body:fd});
    if(!r.ok){ throw new Error(`HTTP ${r.status}`); }
    const d = await r.json();
    busyNote.classList.remove("show");
    resultsEl.innerHTML = (d.results || []).map(res => {
      const ic = res.status === "ok" ? "✅" : res.status === "warn" ? "⚠️" : "❌";
      return `<div class="res-row ${res.status}">
        <span>${ic}</span>
        <span class="rn">${esc(res.file)}</span>
        <span class="rm">${esc(res.msg)}</span>
      </div>`;
    }).join("");
    // 刷新库状态和文档列表
    loadHealth();
    loadDocList();
    // 重置 file input 以支持重复上传同一文件
    fileInput.value = "";
  }catch(e){
    busyNote.classList.remove("show");
    resultsEl.innerHTML = `<div class="res-row error">❌ <span class="rm">上传失败：${esc(e.message)}</span></div>`;
  }
}

async function loadDocList(){
  docRowsEl.innerHTML = "<span style='color:var(--muted);font-size:12px'>加载中…</span>";
  try{
    const r = await fetch(API + "/api/documents");
    const d = await r.json();
    if(!d.documents || d.documents.length === 0){
      docRowsEl.innerHTML = "<span style='color:var(--muted);font-size:12px'>暂无已入库文档</span>";
      return;
    }
    docRowsEl.innerHTML = d.documents.map(doc =>
      `<div class="doc-row" data-src="${esc(doc.source)}">
        <span>📄</span>
        <span class="dn" title="${esc(doc.source)}">${esc(doc.source)}</span>
        <span class="dc">${doc.chunks} 块</span>
        <span class="del" title="从知识库删除">🗑</span>
      </div>`
    ).join("");
    docRowsEl.querySelectorAll(".del").forEach(btn =>
      btn.onclick = async e => {
        e.stopPropagation();
        const row = btn.closest(".doc-row");
        const src = row.dataset.src;
        if(!confirm(`确认从知识库删除「${src}」？`)) return;
        try{
          const res = await fetch(API + "/api/documents/delete", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({source: src})
          });
          if(!res.ok) throw new Error(`HTTP ${res.status}`);
          loadHealth();
          loadDocList();
        }catch(err){
          alert("删除失败：" + err.message);
        }
      }
    );
  }catch(e){
    docRowsEl.innerHTML = "<span style='color:var(--err);font-size:12px'>加载失败</span>";
  }
}

initSamples(); loadHealth(); loadModels();
setInterval(loadHealth, 30000);
</script>
</body>
</html>
