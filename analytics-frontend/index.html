<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>端州政企部 · 经营分析</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar-brand">
    <div class="brand-icon">📊</div>
    <div>
      <h1>端州分公司政企部 · 经营分析</h1>
      <div class="brand-sub">14人客户经理团队 · 深度经营数据看板</div>
    </div>
  </div>
  <div class="topbar-controls">
    <label for="month-select">数据月份</label>
    <select id="month-select" class="select-month"></select>
    <button id="refresh-btn" class="btn btn-ghost">↻ 刷新</button>
    <button id="export-btn" class="btn btn-ghost">⬇ 导出</button>
    <button id="upload-btn" class="btn btn-accent">⬆ 上传数据</button>
  </div>
</header>

<!-- 上传弹窗 -->
<div id="upload-modal" class="modal hidden">
  <div class="modal-box">
    <h2>上传历史数据</h2>
    <p class="hint">支持完美一单报表 / 营服业务通报表（xlsx 格式）<br/>系统自动识别文件类型和月份，解析后仅保留14人数据</p>
    <div class="upload-drop" id="drop-zone">
      <span>拖拽文件到此处，或</span>
      <label class="btn btn-accent" style="margin-top:10px;cursor:pointer;">
        选择文件
        <input type="file" id="file-input" multiple accept=".xlsx,.xls" style="display:none" />
      </label>
    </div>
    <div id="upload-results"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="upload-close-btn">关闭</button>
    </div>
  </div>
</div>

<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-section-label">核心分析</div>
    <ul style="list-style:none">
      <li class="nav-item active" data-tab="overview"><span class="nav-icon">🏠</span><span>经营总览</span></li>
      <li class="nav-item" data-tab="person"><span class="nav-icon">👥</span><span>人员业绩</span></li>
      <li class="nav-item" data-tab="score"><span class="nav-icon">📈</span><span>积分结构</span></li>
      <li class="nav-item" data-tab="progress"><span class="nav-icon">🎯</span><span>进度预测</span></li>
    </ul>
    <div class="sidebar-section-label">对比预警</div>
    <ul style="list-style:none">
      <li class="nav-item" data-tab="compare"><span class="nav-icon">🏆</span><span>县分对比</span></li>
      <li class="nav-item" data-tab="risk"><span class="nav-icon">⚠️</span><span>风险预警</span></li>
    </ul>
    <div class="sidebar-section-label">数据管理</div>
    <ul style="list-style:none">
      <li class="nav-item" data-tab="trend"><span class="nav-icon">📉</span><span>趋势分析</span></li>
      <li class="nav-item" data-tab="snapshots"><span class="nav-icon">🗄</span><span>数据快照</span></li>
    </ul>
  </nav>

  <main class="content">
    <!-- 经营总览 -->
    <section id="tab-overview" class="tab-panel active">
      <div class="kpi-grid" id="kpi-cards"></div>
      <div class="charts-row">
        <div class="chart-card half" id="overview-pts-chart" style="height:320px"></div>
        <div class="chart-card half" id="overview-gaotao-chart" style="height:320px"></div>
      </div>
    </section>

    <!-- 人员业绩（重点页面：14人排名对比）-->
    <section id="tab-person" class="tab-panel hidden">
      <div class="chart-card full" id="person-incentive-chart" style="height:420px"></div>
      <div class="charts-row">
        <div class="chart-card half" id="person-scatter-chart" style="height:380px"></div>
        <div class="chart-card half" id="person-gaotao-chart" style="height:380px"></div>
      </div>
    </section>

    <!-- 积分结构 -->
    <section id="tab-score" class="tab-panel hidden">
      <div class="chart-card full" id="score-pie-chart" style="height:400px"></div>
      <div class="chart-card full" id="score-district-bar" style="height:360px"></div>
    </section>

    <!-- 完成进度 -->
    <section id="tab-progress" class="tab-panel hidden">
      <div class="kpi-grid" id="progress-kpi-cards"></div>
      <div class="chart-card full" id="progress-bar-chart" style="height:480px"></div>
    </section>

    <!-- 县分对比 -->
    <section id="tab-compare" class="tab-panel hidden">
      <div class="chart-card full" id="branch-rank-chart" style="height:400px"></div>
      <div class="chart-card full" id="branch-multi-bar" style="height:360px"></div>
    </section>

    <!-- 风险预警 -->
    <section id="tab-risk" class="tab-panel hidden">
      <div id="alert-cards" class="alert-list"></div>
      <div class="charts-row">
        <div class="chart-card half" id="risk-ratio-chart" style="height:340px"></div>
        <div class="chart-card half" id="risk-history-chart" style="height:340px"></div>
      </div>
    </section>

    <!-- 趋势分析 -->
    <section id="tab-trend" class="tab-panel hidden">
      <div class="chart-card full" id="trend-pts-chart" style="height:380px"></div>
      <div class="chart-card full" id="trend-gaotao-chart" style="height:320px"></div>
    </section>

    <!-- 数据快照 -->
    <section id="tab-snapshots" class="tab-panel hidden">
      <div class="table-card">
        <table id="snapshots-table">
          <thead>
            <tr>
              <th>ID</th><th>数据日期</th><th>月份</th><th>类型</th>
              <th>文件名</th><th>处理时间</th><th>触发方式</th>
            </tr>
          </thead>
          <tbody id="snapshots-body"></tbody>
        </table>
      </div>
    </section>
  </main>
</div>

<div id="toast" class="toast hidden"></div>

<script src="/js/api.js"></script>
<script src="/js/charts.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
